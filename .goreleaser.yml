version: 2

project_name: clash-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: clashc
    main: ./cmd/clashc/
    binary: clashc
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: clashc
    ids:
      - clashc
    name_template: "clashc_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: boomyao
    name: clash-cli
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  header: |
    ## clashc {{ .Tag }}

    A keyboard-driven TUI client for [mihomo](https://github.com/MetaCubeX/mihomo) (Clash Meta).

    ### Install

    ```bash
    curl -fsSL https://raw.githubusercontent.com/boomyao/clash-cli/main/install.sh | sh
    ```

    Or download a binary from the assets below.
